<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="style/style.css">
    
    <title>Apollo Restaurante</title>
</head>
<body>
  <header id="main-nav">
    <div class="texto-menu">
      <h2>Menu navegacao</h2>
      </div>
    </header>
  
  <main id="home-content">
        <section id="main-banner">
            <h1 class="restaurante-title">Restaurante do <span class="destaque-title">Apollo</span></h1>
            <p class="slogan">Uma experiência gastronômica inesquecível</p>
            <button class="botao-reserva">Fazer Reserva</button>
        </section>

        <section id="area-destaques">
            <h1>Destaques</h1>
            <div class="cards-container">
              <div class="card"></div>
              <div class="card"></div>
              <div class="card"></div>
              <div class="card"></div>
            </div>
        </section>

        <section id="promocao-area">
            <h1>Promoções</h1>
            <div class="promocao-text"></div>
            <div class="promocao-image"></div>
        </section>

        <section id="sobre-espaco">
            <h1>Nosso Espaço</h1>
            <img class="img-carousel" src="imagens/home/foto-carousel-1.jpg" alt="imagem 1 do carousel">
            <div class="carousel"></div>
        </section>

    </main>

    <footer id="main-footer"> 
        <h1>Informacoes de contato</h1>
        <div class="footer-column"></div>
        <div class="footer-column"></div>
        <div class="footer-column"></div>
        <div class="footer-column"></div>
    </footer>
    
</body>
</html>
