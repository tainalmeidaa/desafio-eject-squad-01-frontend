<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/footer.css">
</head>
<body>
  
  <footer id="footer-container">
  <div class="footer-logo">
    <img src="/imagens/footer/logo-apollo.png" alt="logo Apollo Restaurante">
  </div>

  <div class="footer-informacoes">
  
  <!--coluna contato-->
    <div class="col1">
      <h3>Contato</h3>
      <div class="contato-item">
        <img src="/imagens/footer/Icon-contato-1.png" alt="Telefone">
        <span>(11) 92234-5678</span>
      </div>
      
      <div class="contato-item">
        <img src="/imagens/footer/Icon-contato-2.png" alt="E-mail">
        <span>RestauranteApollo@gmail.com</span>
      </div>
      
      <div class="contato-item">
        <img src="/imagens/footer/Icon-contato-3.png" alt="Endereço">
        <span>Avenida Roberto Freire, 123 - Natal/RN</span>
      </div>
    </div>
    
    <!--coluna horario-->
    <div class="col2">
      <h3>Horário de Funcionamento</h3>
      <span>Segunda a Sexta: 13h - 22h</span>
      <span>Sábado e Domingo: 12h - 22h</span>
      <span>Feriados: 12h - 22h</span>
    </div>
    
    <!--coluna redes sociais-->
    <div class="col3">
      <h3 class="titulo-redesociais">Redes sociais</h3>
      <div class="icons-redesociais">
        <img src="/imagens/footer/icon-facebook.png" alt="Ícone do facebook">
      <img src="/imagens/footer/icon-instagram.png" alt="Ícone do instagram">
      <img src="/imagens/footer/icon-twitter.png" alt="Ícone do twitter">
      </div>
    </div>
    
      <!--coluna localizacao-->
    <div class="col4">
      <img src="/imagens/footer/img-localizacao.png" alt="Localização no mapa">
    </div>
  </div>

  <div class="footer-bottom">
    <hr>
    <div class="eject-credits">
      <span>2026 - MISSÃO EJECT</span>
      <img src="/imagens/footer/logo-eject.png" alt="logo da Eject">
    </div>
  </div>
</footer>

</body>
</html>
